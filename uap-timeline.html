<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UAP Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #1a1a2e;
    }

    /* ── HEADER ── */
    #header {
      background: #fff;
      border-bottom: 2px solid #e8eaf0;
      padding: 14px 20px 10px;
    }
    #header h1 {
      font-size: 13px; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: #1a1a2e; margin-bottom: 4px;
    }
    #header h1 span { color:#6c757d; font-weight:400; margin-left:8px; font-size:11px; }

    /* ── COLUMN LABELS ── */
    #col-labels {
      display: grid;
      grid-template-columns: 1fr 14px 1fr;
      max-width: 860px; margin: 6px auto 0;
      padding: 0 20px;
      font-size: 9.5px; font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
    }
    #col-labels .lbl-l { text-align:right; padding-right:18px; color:#8e44ad; }
    #col-labels .lbl-r { padding-left:18px; color:#aab0c0; }

    /* ── FILTROS ── */
    #filters { display:flex; gap:6px; flex-wrap:wrap; padding:10px 20px 12px; }
    .filter-btn {
      padding: 3px 11px; border-radius:20px;
      border:1.5px solid; font-size:11px; font-weight:600;
      cursor:pointer; background:transparent;
      letter-spacing:.04em; transition:all .18s;
    }
    .filter-btn[data-group="all"]          { border-color:#aab0c0; color:#6c757d; }
    .filter-btn[data-group="all"].active   { background:#6c757d; color:#fff; border-color:#6c757d; }
    .filter-btn[data-group="0"]            { border-color:#e74c3c; color:#e74c3c; }
    .filter-btn[data-group="0"].active     { background:#e74c3c; color:#fff; }
    .filter-btn[data-group="1"]            { border-color:#27ae60; color:#27ae60; }
    .filter-btn[data-group="1"].active     { background:#27ae60; color:#fff; }
    .filter-btn[data-group="2"]            { border-color:#e67e22; color:#e67e22; }
    .filter-btn[data-group="2"].active     { background:#e67e22; color:#fff; }
    .filter-btn[data-group="3"]            { border-color:#2980b9; color:#2980b9; }
    .filter-btn[data-group="3"].active     { background:#2980b9; color:#fff; }
    .filter-btn[data-group="4h"]           { border-color:#8e44ad; color:#8e44ad; }
    .filter-btn[data-group="4h"].active    { background:#8e44ad; color:#fff; }
    .filter-btn[data-group="4l"]           { border-color:#b07fd4; color:#b07fd4; }
    .filter-btn[data-group="4l"].active    { background:#b07fd4; color:#fff; }

    /* ── GRID ── */
    #timeline {
      padding: 12px 20px 60px;
      max-width: 860px; margin:0 auto;
      position: relative;
    }
    #timeline::before {
      content:'';
      position:absolute;
      left: calc(50% - 1px);
      top:0; bottom:0; width:2px;
      background: linear-gradient(to bottom,
        transparent, #e0e4ec 20px,
        #e0e4ec calc(100% - 36px), transparent);
      pointer-events:none;
    }

    .tl-row {
      display: grid;
      grid-template-columns: 1fr 14px 1fr;
      align-items: start;
    }
    .tl-row.hidden { display:none !important; }

    .ev-left   { min-width:0; padding-right:14px; }
    .ev-center { display:flex; justify-content:center; }
    .ev-right  { min-width:0; padding-left:14px; }

    /* ── YEAR MARKER ── */
    .year-marker { align-items:center; margin:22px 0 3px; }
    .year-marker .ev-left { text-align:right; }
    .year-label { font-size:11px; font-weight:800; letter-spacing:.08em; color:#bec5cf; }
    .year-dot {
      width:8px; height:8px; border-radius:50%;
      background:#dde1ea; border:2px solid #fff;
      box-shadow:0 0 0 2px #dde1ea;
    }
    .year-line { height:1px; background:#f0f1f5; flex:1; }

    /* ── EVENTO ── */
    .event { padding:3px 0; }

    .event-dot {
      width:14px; height:14px; border-radius:50%;
      border:3px solid #fff;
      position:relative; z-index:1;
      margin-top:10px; cursor:pointer;
      transition:transform .15s; flex-shrink:0;
    }
    .event-dot:hover { transform:scale(1.3); }

    /* dot de ley: cuadrado redondeado */
    .event-dot.dot-law {
      border-radius:3px;
    }

    .date-left  { text-align:right; padding-top:9px; }
    .date-right { text-align:left;  padding-top:9px; }
    .ev-day   { font-size:11px; font-weight:700; color:#aab0c0; line-height:1.2; }
    .ev-month { font-size:10px; color:#c8cdd5; }

    /* ── CARDS ── */
    .event-card {
      background:#f9fafb;
      border:1.5px solid #e8eaf0;
      border-left-width:4px;
      border-radius:8px;
      padding:8px 12px;
      cursor:pointer;
      transition:box-shadow .18s, background .18s;
    }
    /* Congress cards: borde derecho */
    .card-congress {
      border-left-width:1.5px;
      border-right-width:4px;
      text-align:right;
    }
    /* Law cards: fondo ligeramente diferente */
    .card-law {
      background:#faf8fd;
      border-style: dashed;
      border-right-style: solid;
    }
    .event-card:hover { background:#fff; box-shadow:0 3px 14px rgba(0,0,0,.08); }
    .event-card.open  { background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.1); }

    .card-cat {
      font-size:9px; font-weight:800;
      letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px;
    }
    .card-title {
      font-size:12.5px; font-weight:700;
      color:#1a1a2e; line-height:1.3;
    }
    .toggle-icon {
      font-size:11px; color:#bec5cf;
      transition:transform .25s; display:inline-block;
      vertical-align:middle; margin-left:4px;
    }
    .card-congress .toggle-icon { margin-left:0; margin-right:4px; }
    .event-card.open .toggle-icon { transform:rotate(180deg); }

    .card-detail {
      overflow:hidden; max-height:0;
      transition:max-height .32s ease, opacity .28s ease, margin-top .28s;
      opacity:0; margin-top:0;
    }
    .card-detail.open { max-height:600px; opacity:1; margin-top:9px; }

    .card-body { font-size:11.5px; color:#4a5568; line-height:1.65; margin-bottom:8px; }
    .card-actors { display:flex; flex-wrap:wrap; gap:4px; }
    .card-congress .card-actors { justify-content:flex-end; }
    .actor-tag {
      font-size:10px; font-weight:600;
      padding:2px 7px; border-radius:12px;
      background:#f0f1f5; color:#6c757d;
    }

    /* ── COLORES ── */
    .cat-0{color:#e74c3c;} .dot-0{background:#e74c3c;box-shadow:0 0 0 1.5px #e74c3c;}
    .border-0{border-left-color:#e74c3c;}
    .cat-1{color:#27ae60;} .dot-1{background:#27ae60;box-shadow:0 0 0 1.5px #27ae60;}
    .border-1{border-left-color:#27ae60;}
    .cat-2{color:#e67e22;} .dot-2{background:#e67e22;box-shadow:0 0 0 1.5px #e67e22;}
    .border-2{border-left-color:#e67e22;}
    .cat-3{color:#2980b9;} .dot-3{background:#2980b9;box-shadow:0 0 0 1.5px #2980b9;}
    .border-3{border-left-color:#2980b9;}
    /* Audiencia */
    .cat-4h{color:#8e44ad;} .dot-4h{background:#8e44ad;box-shadow:0 0 0 1.5px #8e44ad;}
    .border-r-4h{border-right-color:#8e44ad;}
    /* Legislación */
    .cat-4l{color:#b07fd4;} .dot-4l{background:#b07fd4;box-shadow:0 0 0 1.5px #b07fd4;}
    .border-r-4l{border-right-color:#b07fd4;}
  </style>
</head>

const IS_CONGRESS = g => g === '4h' || g === '4l';

function buildTimeline(filterGroup) {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  let currentYear = null;

  EVENTS.forEach((ev, i) => {
    const g = ev.group;
    const isCongress = IS_CONGRESS(g);

    // filter logic
    let hidden = false;
    if (filterGroup !== 'all') {
      if (filterGroup === '4h' || filterGroup === '4l') {
        hidden = g !== filterGroup;
      } else {
        hidden = g !== filterGroup;
      }
    }

    // ── Year marker ──
    if (ev.year !== currentYear) {
      currentYear = ev.year;
      const ym = document.createElement('div');
      ym.className = 'tl-row year-marker';
      ym.innerHTML = `
        <div class="ev-left" style="text-align:right">
          <span class="year-label">${ev.year}</span>
        </div>
        <div class="ev-center"><div class="year-dot"></div></div>
        <div class="ev-right" style="display:flex;align-items:center">
          <div class="year-line"></div>
        </div>`;
      container.appendChild(ym);
    }

    // ── Event row ──
    const row = document.createElement('div');
    row.className = 'tl-row event' + (hidden ? ' hidden' : '');
    row.dataset.group = g;

    const dateStr = ev.day
      ? `<div class="ev-day">${ev.day}</div><div class="ev-month">${ev.month}</div>`
      : `<div class="ev-month">${ev.month || ''}</div>`;

    const dotClass = `event-dot dot-${g}${g === '4l' ? ' dot-law' : ''}`;
    const cardBase = isCongress
      ? `event-card card-congress border-r-${g}${g === '4l' ? ' card-law' : ''}`
      : `event-card border-${g}`;

    const actorsHTML = ev.actors.map(a => `<span class="actor-tag">${a}</span>`).join('');
    const titleIcon = isCongress
      ? `<span class="toggle-icon">▾</span> ${ev.label}`
      : `${ev.label} <span class="toggle-icon">▾</span>`;

    const cardHTML = `
      <div class="${cardBase}">
        <div class="card-cat cat-${g}">${CAT[g]}</div>
        <div class="card-title">${titleIcon}</div>
        <div class="card-detail">
          <div class="card-body">${ev.body}</div>
          <div class="card-actors">${actorsHTML}</div>
        </div>
      </div>`;

    if (isCongress) {
      row.innerHTML = `
        <div class="ev-left">${cardHTML}</div>
        <div class="ev-center"><div class="${dotClass}"></div></div>
        <div class="ev-right"><div class="date-right">${dateStr}</div></div>`;
    } else {
      row.innerHTML = `
        <div class="ev-left" style="text-align:right"><div class="date-left">${dateStr}</div></div>
        <div class="ev-center"><div class="${dotClass}"></div></div>
        <div class="ev-right">${cardHTML}</div>`;
    }

    container.appendChild(row);

    // Toggle
    const card   = row.querySelector('.event-card');
    const detail = row.querySelector('.card-detail');
    card.addEventListener('click', () => {
      const isOpen = detail.classList.contains('open');
      document.querySelectorAll('.card-detail.open').forEach(d => {
        d.classList.remove('open');
        d.closest('.event-card').classList.remove('open');
      });
      if (!isOpen) { detail.classList.add('open'); card.classList.add('open'); }
    });
  });

  // Ocultar year-markers sin eventos visibles
  if (filterGroup !== 'all') {
    document.querySelectorAll('.year-marker').forEach(ym => {
      let sib = ym.nextElementSibling;
      let visible = false;
      while (sib && !sib.classList.contains('year-marker')) {
        if (!sib.classList.contains('hidden')) visible = true;
        sib = sib.nextElementSibling;
      }
      ym.style.display = visible ? '' : 'none';
    });
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    buildTimeline(this.dataset.group);
  });
});

buildTimeline('all');
</script>
</body>
</html>
